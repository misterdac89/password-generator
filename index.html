<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,700;0,900;1,500&family=Roboto:wght@100;300;400;500;700;900&family=Source+Sans+Pro:wght@400;600;900&display=swap"
      rel="stylesheet">
   <link rel="stylesheet" href="index.css">
   <title>Password Generator</title>
</head>

<body>
   <div class="primary-container">
      <div class="secondary-container">
         <h1>Generate a <span class="green-text">random password</span></h1>
         <p>Never use an unsecure password again.</p>
         <button class="generator-btn" id="generator-btn">Generate passwords</button>
         <div class="password-container">
            <button id="passwordOne" class="password-box"></button>
            <button id="passwordTwo" class="password-box"></button>
         </div>
      </div>
   </div>
   <script src="index.js"></script>
</body>
</html>
